<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية لوسفر | التقديمات</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
            url('https://cdn.discordapp.com/attachments/1476678585103417415/1479321826931900528/f7bf83a04d8fb47890edc2629eba03bb.webp');
            background-size: cover; background-attachment: fixed; color: #ffcc00; 
            font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; 
        }
        .container { padding: 50px 20px; }
        .btn { 
            background: rgba(0,0,0,0.7); color: #ffcc00; border: 2px solid #ffcc00; 
            padding: 15px 40px; margin: 10px; border-radius: 10px; cursor: pointer; 
            font-weight: bold; width: 100%; max-width: 300px; transition: 0.3s;
        }
        .btn:hover { background: #ffcc00; color: #000; }
        .modal { 
            display: none; position: fixed; inset: 0; background: #000; 
            overflow-y: auto; padding: 20px; z-index: 1000; 
        }
        .q-box { background: #111; padding: 20px; border-radius: 10px; border-right: 5px solid #ffcc00; margin-bottom: 20px; text-align: right; }
        input, textarea, select { width: 100%; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; margin-top: 10px; }
        .send-btn { background: #ffcc00; color: #000; padding: 20px; width: 100%; max-width: 400px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="home">
        <h1>أكاديمية لوسفر</h1>
        <button class="btn" onclick="openForm('gang')">تقديم عصابة</button><br>
        <button class="btn" onclick="openForm('police')">تقديم شرطة</button><br>
        <button class="btn" onclick="openForm('staff')">تقديم إدارة</button>
    </div>

    <div id="modal" class="modal">
        <button onclick="location.reload()" style="background:#ffcc00; border:none; padding:10px; border-radius:5px; cursor:pointer;">رجوع</button>
        <div style="max-width: 600px; margin: 20px auto;">
            <div class="q-box"><p>اسم حسابك في روبلوكس:</p><input type="text" id="rblx"></div>
            <div class="q-box"><p>آيدي الديسكورد الخاص بك:</p><input type="text" id="userId"></div>
            <div id="questions"></div>
            <button class="send-btn" onclick="submit()">إرسال التقديم</button>
        </div>
    </div>

    <script>
        let currentType = "";
        const API_URL = "http://prem-eu4.bot-hosting.net:20802/submit"; // رابط بورت استضافتك

        function openForm(type) {
            currentType = type;
            document.getElementById('home').style.display = 'none';
            document.getElementById('modal').style.display = 'block';
            const q = document.getElementById('questions');

            if(type === 'police') {
                q.innerHTML = `
                    <div class="q-box"><p>ماهو هدف الشرطة في الماب؟</p><textarea id="ans1"></textarea></div>
                    <div class="q-box"><p>لماذا تريد التقديم علي الشرطة؟</p><textarea id="ans2"></textarea></div>
                    <div class="q-box"><p>هل ستحترم الرتب والقادة؟</p><select id="ans3"><option value="نعم">نعم</option><option value="لا">لا</option></select></div>
                `;
            } else if(type === 'gang') {
                q.innerHTML = `
                    <div class="q-box"><p>ما هي خبراتك في الإجرام؟</p><textarea id="ans1"></textarea></div>
                    <div class="q-box"><p>لماذا تريد التقديم علي العصابة؟</p><textarea id="ans2"></textarea></div>
                    <div class="q-box"><p>هل ستتبع قوانين العصابة؟</p><select id="ans3"><option value="نعم">نعم</option></select></div>
                `;
            } else {
                q.innerHTML = `
                    <div class="q-box"><p>ما هي خبراتك السابقة كإداري؟</p><textarea id="ans1"></textarea></div>
                    <div class="q-box"><p>كيف ستتعامل مع لاعب خالف القوانين؟</p><textarea id="ans2"></textarea></div>
                    <div class="q-box"><p>كم ساعة تستطيع التواجد يومياً؟</p><input type="text" id="ans3"></div>
                `;
            }
        }

        async function submit() {
            const rbx = document.getElementById('rblx').value;
            const uid = document.getElementById('userId').value;
            if(!rbx || !uid) return alert("الرجاء ملء البيانات!");

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: currentType, userId: uid, rblx: rbx,
                        q1: document.getElementById('ans1').value,
                        q2: document.getElementById('ans2').value + "\n" + document.getElementById('ans3').value
                    })
                });
                alert("✅ تم الإرسال بنجاح!");
                location.reload();
            } catch (e) { alert("❌ البوت غير متصل بالاستضافة!"); }
        }
    </script>
</body>
</html>
