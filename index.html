<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية لوسفر | التقديمات</title>
    <style>
        body { 
            background: #000; 
            color: #ffcc00; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { margin-top: 50px; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(255, 204, 0, 0.5); }
        
        /* واجهة الأزرار الرئيسية */
        .home-menu { margin-top: 40px; }
        .menu-btn { 
            background: #111; 
            color: #ffcc00; 
            border: 2px solid #ffcc00; 
            padding: 20px 40px; 
            margin: 10px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 250px;
            transition: 0.3s;
        }
        .menu-btn:hover { background: #ffcc00; color: #000; box-shadow: 0 0 20px #ffcc00; }

        /* صندوق التقديم */
        .box { 
            background: #111; 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #ffcc00; 
            max-width: 450px; 
            margin: 20px auto; 
            display: none; /* مخفي في البداية */
        }
        input, textarea { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 8px; 
            font-size: 1rem;
            text-align: center;
        }
        textarea { height: 100px; resize: none; }
        .send-btn { 
            background: #ffcc00; 
            color: #000; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.1rem; 
            margin-top: 10px;
        }
        .send-btn:disabled { background: #555; cursor: not-allowed; }
        .back-text { color: #fff; cursor: pointer; margin-top: 15px; display: inline-block; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="home">
        <h1>أكاديمية لوسفر</h1>
        <div class="home-menu">
            <button class="menu-btn" onclick="openForm('gang')">تقديم عصابة</button><br>
            <button class="menu-btn" onclick="openForm('police')">تقديم شرطة</button><br>
            <button class="menu-btn" onclick="openForm('staff')">تقديم إدارة</button>
        </div>
    </div>

    <div id="formSection" class="box">
        <h2 id="formTitle"></h2>
        <input type="text" id="rbx" placeholder="اسمك في روبلوكس">
        <input type="text" id="uid" placeholder="آيدي الديسكورد">
        <textarea id="q1" placeholder="لماذا تريد الانضمام؟"></textarea>
        <button id="sendBtn" class="send-btn" onclick="submitData()">إرسال التقديم</button>
        <span class="back-text" onclick="location.reload()">← العودة للقائمة</span>
    </div>

    <script>
        let currentType = "";
        // رابط البورت الخاص بك في استضافة Bot-Hosting
        const API_URL = "http://prem-eu4.bot-hosting.net:20802/submit"; 

        function openForm(t) {
            currentType = t;
            document.getElementById('home').style.display = 'none';
            document.getElementById('formSection').style.display = 'block';
            
            const titles = {
                'gang': 'تقديم العصابة',
                'police': 'تقديم الشرطة',
                'staff': 'تقديم الإدارة'
            };
            document.getElementById('formTitle').innerText = titles[t];
        }

        async function submitData() {
            const rblx = document.getElementById('rbx').value;
            const uid = document.getElementById('uid').value;
            const q1 = document.getElementById('q1').value;
            const btn = document.getElementById('sendBtn');

            if(!rblx || !uid || !q1) return alert("يرجى ملء كافة البيانات");

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            const data = {
                type: currentType,
                rblx: rblx,
                userId: uid,
                q1: q1,
                q2: "تمت الموافقة على الشروط"
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("✅ تم إرسال تقديمك بنجاح!");
                    location.reload();
                } else {
                    alert("❌ فشل الإرسال، تأكد من تشغيل البوت في الاستضافة");
                    btn.disabled = false;
                    btn.innerText = "إرسال التقديم";
                }
            } catch (error) {
                alert("❌ خطأ: لم يتم العثور على البوت (تأكد من الـ Network)");
                btn.disabled = false;
                btn.innerText = "إرسال التقديم";
            }
        }
    </script>
</body>
</html>
