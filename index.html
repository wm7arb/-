<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية لوسفر | التقديمات الرسمية</title>
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #0a0a0a;
            --card-bg: #151515;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--primary);
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }

        .menu-btns { display: flex; flex-direction: column; gap: 15px; }

        button {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .form-group {
            display: none;
            text-align: right;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin: 15px 0 5px; color: var(--primary); }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
        }

        textarea { height: 100px; resize: none; }

        .submit-btn {
            background: var(--primary);
            color: #000;
            margin-top: 25px;
            width: 100%;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            cursor: pointer;
        }

        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="mainMenu">
        <h1>أكاديمية لوسفر</h1>
        <p>اختر القسم الذي تود الانضمام إليه</p>
        <div class="menu-btns">
            <button onclick="showForm('عصابة')">تقديم عصابة (GANG)</button>
            <button onclick="showForm('شرطة')">تقديم شرطة (POLICE)</button>
            <button onclick="showForm('إدارة')">تقديم إدارة (STAFF)</button>
        </div>
    </div>

    <div id="applicationForm" class="form-group">
        <h2 id="formTitle">نموذج التقديم</h2>
        
        <label>اسمك في روبلوكس:</label>
        <input type="text" id="rblxName" placeholder="مثال: Lucifer_Player">

        <label>آيدي الديسكورد (ID):</label>
        <input type="text" id="discordId" placeholder="مثال: 123456789012345">

        <label>لماذا تريد الانضمام إلينا؟</label>
        <textarea id="reason" placeholder="اكتب سبب رغبتك في الانضمام..."></textarea>

        <button class="submit-btn" id="sendBtn" onclick="submitApp()">إرسال التقديم الآن</button>
        <span class="back-link" onclick="goBack()">← العودة للقائمة الرئيسية</span>
    </div>
</div>

<script>
    let currentType = "";
    // تم وضع البورت الخاص بك هنا تلقائياً
    const API_URL = "http://prem-eu4.bot-hosting.net:20802/submit";

    function showForm(type) {
        currentType = type;
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('applicationForm').style.display = 'block';
        document.getElementById('formTitle').innerText = "تقديم لـ " + type;
    }

    function goBack() {
        document.getElementById('mainMenu').style.display = 'block';
        document.getElementById('applicationForm').style.display = 'none';
    }

    async function submitApp() {
        const rblx = document.getElementById('rblxName').value;
        const uid = document.getElementById('discordId').value;
        const q1 = document.getElementById('reason').value;
        const btn = document.getElementById('sendBtn');

        if(!rblx || !uid || !q1) return alert("الرجاء ملء جميع الحقول!");

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        const data = {
            type: currentType,
            rblx: rblx,
            userId: uid,
            q1: q1
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("✅ تم إرسال تقديمك بنجاح! انتظر الرد في ديسكورد.");
                location.reload();
            } else {
                alert("❌ فشل الإرسال، تأكد من تشغيل البوت في الاستضافة.");
                btn.disabled = false;
                btn.innerText = "إرسال التقديم الآن";
            }
        } catch (error) {
            alert("❌ خطأ في الاتصال بالبوت. تأكد من إعدادات الـ Network.");
            btn.disabled = false;
            btn.innerText = "إرسال التقديم الآن";
        }
    }
</script>

</body>
</html>
